name: Release VS Code extension

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the prepared VSIX files to the VS Code Marketplace
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark the Marketplace release as pre-release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify authorized tag actor
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.actor }}" != "popov95s" ]; then
            echo "Tag releases are restricted to popov95s." >&2
            exit 1
          fi

      - name: Verify unified release version
        env:
          TAG_VERSION: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const tag = process.env.TAG_VERSION.replace(/^v/, '');
          const cargo = fs.readFileSync('Cargo.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const extension = JSON.parse(fs.readFileSync('editors/vscode/package.json', 'utf8')).version;
          if (process.env.EVENT_NAME === 'push' && (tag !== cargo || tag !== extension)) {
            throw new Error(`tag=${tag}, cargo=${cargo}, vscode=${extension}; all release versions must match`);
          }
          NODE

  package:
    needs: verify-version
    name: Package ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
          - target: darwin-x64
            runner: macos-13
          - target: linux-x64
            runner: ubuntu-latest
          - target: win32-x64
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.97.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Build native language server
        run: cargo build --release --no-default-features --features all-langs,lsp

      - name: Install extension dependencies
        run: npm ci
        working-directory: editors/vscode

      - name: Typecheck and bundle extension
        run: npm run check && npm run build && npm run prepare-binary
        working-directory: editors/vscode

      - name: Create platform VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}
        working-directory: editors/vscode

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: editors/vscode/*.vsix
          if-no-files-found: error

  publish:
    if: github.event_name == 'push' || inputs.publish
    needs: package
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Publish platform VSIX files
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          PRE_RELEASE: ${{ inputs.prerelease }}
        run: |
          for package in *.vsix; do
            if [ "$PRE_RELEASE" = "true" ]; then
              npx @vscode/vsce publish --packagePath "$package" --pre-release
            else
              npx @vscode/vsce publish --packagePath "$package"
            fi
          done
