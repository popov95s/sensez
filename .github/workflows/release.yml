name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
          - npm
          - release

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify authorized actor
        run: |
          if [ "${{ github.actor }}" != "popov95s" ]; then
            echo "This release workflow is restricted to popov95s." >&2
            exit 1
          fi

      - name: Verify version format
        run: |
          case "${{ inputs.version }}" in
            v*) echo "Pass the version without a leading v." >&2; exit 1 ;;
          esac

      - name: Verify package versions
        env:
          RELEASE_VERSION: ${{ inputs.version }}
          RELEASE_TARGET: ${{ inputs.target }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const wanted = process.env.RELEASE_VERSION;
          const target = process.env.RELEASE_TARGET;
          const cargo = fs.readFileSync('Cargo.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const pyproject = fs.readFileSync('pyproject.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const npm = target === 'npm' || target === 'release'
            ? JSON.parse(fs.readFileSync('npm/package.json', 'utf8')).version
            : wanted;
          if (!wanted || cargo !== wanted || pyproject !== wanted || npm !== wanted) {
            console.error(`release version mismatch: target=${target}, wanted=${wanted}, cargo=${cargo}, pyproject=${pyproject}, npm=${npm}`);
            process.exit(1);
          }
          NODE

  build-pypi-wheels:
    needs: guard
    if: ${{ inputs.target == 'pypi' || inputs.target == 'release' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Build Python-only wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --no-default-features --features lang-python --out dist/pypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.target }}
          path: dist/pypi/*.whl
          if-no-files-found: error

  publish-pypi:
    needs: build-pypi-wheels
    if: ${{ inputs.target == 'pypi' || inputs.target == 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          path: dist/pypi
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi

  build-testpypi-wheels:
    needs: guard
    if: ${{ inputs.target == 'testpypi' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build Python-only wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --no-default-features --features lang-python --out dist/testpypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-wheel-macos-arm64
          path: dist/testpypi/*.whl
          if-no-files-found: error

  publish-testpypi:
    needs: build-testpypi-wheels
    if: ${{ inputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: testpypi-wheel-*
          path: dist/testpypi
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/testpypi
          repository-url: https://test.pypi.org/legacy/

  build-npm-assets:
    needs: guard
    if: ${{ inputs.target == 'npm' || inputs.target == 'release' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: sensez-js-linux-x64
          - os: ubuntu-24.04-arm
            asset: sensez-js-linux-arm64
          - os: macos-15-intel
            asset: sensez-js-darwin-x64
          - os: macos-15
            asset: sensez-js-darwin-arm64
          - os: windows-latest
            asset: sensez-js-win32-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build JS/TS release binary
        run: cargo build --release --no-default-features --features lang-typescript

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist/npm
          binary="target/release/sense"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="target/release/sense.exe"
          fi
          cp "$binary" "dist/npm/${{ matrix.asset }}"

      - name: Upload multiplatform binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-binary-${{ matrix.asset }}
          path: dist/npm/${{ matrix.asset }}

  create-gh-release:
    needs: build-npm-assets
    if: ${{ inputs.target == 'npm' || inputs.target == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: npm-binary-*
          path: dist/release-assets
          merge-multiple: true

      - name: Create Single GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: dist/release-assets/*
          generate_release_notes: true

  publish-npm:
    needs: create-gh-release
    if: ${{ inputs.target == 'npm' || inputs.target == 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
