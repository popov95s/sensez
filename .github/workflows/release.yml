name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify authorized actor
        run: |
          if [ "${{ github.actor }}" != "popov95s" ]; then
            echo "This release workflow is restricted to popov95s." >&2
            exit 1
          fi

      - name: Verify version format
        run: |
          case "${{ inputs.version }}" in
            v*) echo "Pass the version without a leading v." >&2; exit 1 ;;
          esac

      - name: Verify package versions
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const wanted = process.env.RELEASE_VERSION;
          const cargo = fs.readFileSync('Cargo.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const pyproject = fs.readFileSync('pyproject.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const npm = JSON.parse(fs.readFileSync('npm/package.json', 'utf8')).version;
          if (!wanted || cargo !== wanted || pyproject !== wanted || npm !== wanted) {
            console.error(`release version mismatch: wanted=${wanted}, cargo=${cargo}, pyproject=${pyproject}, npm=${npm}`);
            process.exit(1);
          }
          NODE

  build-pypi-wheels:
    needs: guard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-13
          - os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Python-only wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --no-default-features --features lang-python --out dist/pypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.os }}
          path: dist/pypi/*.whl
          if-no-files-found: error

  publish-pypi:
    needs: build-pypi-wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          path: dist/pypi
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-npm-assets:
    needs: guard
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: sensez-js-linux-x64
          - os: macos-13
            asset: sensez-js-darwin-x64
          - os: windows-latest
            asset: sensez-js-win32-x64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build JS/TS release binary
        run: cargo build --release --no-default-features --features lang-typescript

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p dist/npm
          binary="target/release/sense"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="target/release/sense.exe"
          fi
          cp "$binary" "dist/npm/${{ matrix.asset }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: dist/npm/${{ matrix.asset }}
          generate_release_notes: ${{ matrix.asset == 'sensez-js-linux-x64' }}

  publish-npm:
    needs: build-npm-assets
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Publish npm package
        working-directory: npm
        run: npm publish --provenance --access public
