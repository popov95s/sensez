name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options:
          - docs
          - testpypi
          - pypi
          - npm
          - release
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.versions.outputs.base_version }}
      release_version: ${{ steps.versions.outputs.release_version }}
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify authorized actor
        run: |
          if [ "${{ github.actor }}" != "popov95s" ]; then
            echo "This release workflow is restricted to popov95s." >&2
            exit 1
          fi

      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            printf 'target=release\n' >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "$(echo '${{ github.ref_name }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          else
            printf 'target=%s\n' "${{ inputs.target }}" >> "$GITHUB_OUTPUT"
            printf 'version=%s\n' "${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute release version
        id: versions
        shell: bash
        run: |
          base_version="${{ steps.resolve.outputs.version }}"
          if [ "${{ steps.resolve.outputs.target }}" = "testpypi" ]; then
            release_version="$(python3 -c 'import os; print("{}-dev{}{:02d}".format(os.environ["BASE_VERSION"], int(os.environ["GITHUB_RUN_NUMBER"]), int(os.environ["GITHUB_RUN_ATTEMPT"])))')"
          else
            release_version="$base_version"
          fi
          printf 'base_version=%s\n' "$base_version" >> "$GITHUB_OUTPUT"
          printf 'release_version=%s\n' "$release_version" >> "$GITHUB_OUTPUT"
        env:
          BASE_VERSION: ${{ steps.resolve.outputs.version }}

      - name: Verify package versions
        env:
          BASE_VERSION: ${{ steps.versions.outputs.base_version }}
          RELEASE_TARGET: ${{ steps.resolve.outputs.target }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const wanted = process.env.BASE_VERSION;
          const target = process.env.RELEASE_TARGET;
          const cargo = fs.readFileSync('Cargo.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const pyproject = fs.readFileSync('pyproject.toml', 'utf8').match(/^version\s*=\s*"([^"]+)"/m)?.[1];
          const npmPackages = target === 'npm' || target === 'release'
            ? ['npm/package.json', ...fs.readdirSync('npm/platform').map((name) => `npm/platform/${name}/package.json`)]
            : [];
          const npmVersions = npmPackages.map((file) => `${file}=${JSON.parse(fs.readFileSync(file, 'utf8')).version}`);
          const optionalDeps = target === 'npm' || target === 'release'
            ? Object.entries(JSON.parse(fs.readFileSync('npm/package.json', 'utf8')).optionalDependencies ?? {})
                .map(([name, version]) => `optional:${name}=${version}`)
            : [];
          const mismatchedNpm = npmVersions.filter((entry) => !entry.endsWith(`=${wanted}`));
          const mismatchedOptionalDeps = optionalDeps.filter((entry) => !entry.endsWith(`=${wanted}`));
          if (!wanted || cargo !== wanted || pyproject !== wanted || mismatchedNpm.length > 0 || mismatchedOptionalDeps.length > 0) {
            console.error(`release version mismatch: target=${target}, wanted=${wanted}, cargo=${cargo}, pyproject=${pyproject}, npm=[${npmVersions.join(', ')}], optional=[${optionalDeps.join(', ')}]`);
            process.exit(1);
          }
          NODE

  build-pypi-wheels:
    needs: guard
    if: ${{ needs.guard.outputs.target == 'pypi' || needs.guard.outputs.target == 'release' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Build Python + MCP wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --no-default-features --features lang-python,mcp --out dist/pypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-wheel-${{ matrix.target }}
          path: dist/pypi/*.whl
          if-no-files-found: error

  publish-pypi:
    needs: build-pypi-wheels
    if: ${{ needs.guard.outputs.target == 'pypi' || needs.guard.outputs.target == 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-wheel-*
          path: dist/pypi
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi

  build-testpypi-wheels:
    needs: guard
    if: ${{ needs.guard.outputs.target == 'testpypi' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Stamp TestPyPI version
        env:
          RELEASE_VERSION: ${{ needs.guard.outputs.release_version }}
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          version = os.environ["RELEASE_VERSION"]
          for path_text in ("Cargo.toml", "pyproject.toml"):
              path = Path(path_text)
              text = path.read_text()
              text = re.sub(r'(?m)^version\s*=\s*"[^"]+"$', f'version = "{version}"', text, count=1)
              path.write_text(text)
          PY

      - name: Build Python + MCP + eyez wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --no-default-features --features lang-python,mcp,eyez --out dist/testpypi

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-wheel-macos-arm64
          path: dist/testpypi/*.whl
          if-no-files-found: error

  publish-testpypi:
    needs: build-testpypi-wheels
    if: ${{ needs.guard.outputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: testpypi-wheel-*
          path: dist/testpypi
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/testpypi
          repository-url: https://test.pypi.org/legacy/

  build-npm-packages:
    needs: guard
    if: ${{ needs.guard.outputs.target == 'npm' || needs.guard.outputs.target == 'release' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: sensez-linux-x64-gnu
            binary: sensez
          - os: ubuntu-24.04-arm
            package: sensez-linux-arm64-gnu
            binary: sensez
          - os: macos-15-intel
            package: sensez-darwin-x64
            binary: sensez
          - os: macos-15
            package: sensez-darwin-arm64
            binary: sensez
          # - os: windows-latest
          #   package: sensez-win32-x64-msvc
          #   binary: sensez.exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build JS/TS + MCP release binary
        run: cargo build --release --no-default-features --features lang-typescript,mcp

      - name: Stage native npm package
        shell: bash
        run: |
          pkg="dist/npm/${{ matrix.package }}"
          mkdir -p "$pkg/bin"
          binary="target/release/sensez"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="target/release/sensez.exe"
          fi
          cp "npm/platform/${{ matrix.package }}/package.json" "$pkg/package.json"
          cp LICENSE "$pkg/LICENSE"
          cp "$binary" "$pkg/bin/${{ matrix.binary }}"
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod 755 "$pkg/bin/${{ matrix.binary }}"
          fi

      - name: Upload native npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-${{ matrix.package }}
          path: dist/npm
          if-no-files-found: error

  publish-npm:
    needs: build-npm-packages
    if: ${{ needs.guard.outputs.target == 'npm' || needs.guard.outputs.target == 'release' }}
    runs-on: ubuntu-latest
    environment:
      name: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.5.1

      - name: Download native packages
        uses: actions/download-artifact@v4
        with:
          pattern: npm-package-*
          path: dist/npm-packages
          merge-multiple: true

      - name: Publish native packages
        shell: bash
        run: |
          for pkg in dist/npm-packages/*; do
            [ -d "$pkg" ] || continue
            if [ -f "$pkg/bin/sensez" ]; then
              chmod 755 "$pkg/bin/sensez"
            fi
            npm publish "$pkg" --provenance --access public
          done

      - name: Publish wrapper package
        working-directory: npm
        run: npm publish --provenance --access public

  publish-docs:
    needs:
      - guard
      - publish-pypi
      - publish-npm
    if: ${{ always() && (needs.guard.outputs.target == 'docs' || (needs.guard.outputs.target == 'release' && needs.publish-pypi.result == 'success' && needs.publish-npm.result == 'success') || (needs.guard.outputs.target == 'pypi' && needs.publish-pypi.result == 'success')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build sensez binary
        run: cargo build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.5"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/examples/package-lock.json

      - name: Install docs example JS tooling
        run: npm ci
        working-directory: docs/examples

      - name: Generate docs reference
        run: uv run --no-project docs/generate.py

      - name: Verify docs reference is current
        run: git diff --exit-code -- docs/reference/findings.md

      - name: Verify docs examples
        run: uv run --no-project docs/verify_examples.py

      - name: Verify docs examples formatting
        run: |
          uv run --no-project --with ruff ruff format --no-cache --check docs/examples
          uv run --no-project --with ruff ruff check --no-cache --select COM812 docs/examples
          npm --prefix docs/examples run check

      - name: Deploy versioned docs
        env:
          DOCS_VERSION: ${{ needs.guard.outputs.base_version }}
          NO_MKDOCS_2_WARNING: "1"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true
          uv run --no-project --with mkdocs-material --with mike mike deploy --push --update-aliases "$DOCS_VERSION" latest
          uv run --no-project --with mkdocs-material --with mike mike set-default --push latest
