name: CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'npm/**'
      - 'benchmarks/**'
      - 'baseline-comparisons/**'
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'action/README.md'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'npm/**'
      - 'benchmarks/**'
      - 'baseline-comparisons/**'
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'action/README.md'

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Audit dependencies
        run: cargo deny check

      - name: Lint
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Generate docs reference
        run: python3 docs/generate.py

      - name: Verify docs reference is current
        run: git diff --exit-code -- docs/reference/findings.md

      - name: Verify docs examples against sensez
        # Drives the local debug binary: for each docs/examples/<kind>/ folder
        # bad stage must produce the named finding and fixed.* must be clean.
        run: python3 docs/verify_examples.py

      - name: Dogfood
        run: cargo run -- noze . --fail-on-new must_fix

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build sensez (release)
        run: cargo build --release --features all-langs

      - name: Run benchmarks
        run: ./benchmarks/run.sh
