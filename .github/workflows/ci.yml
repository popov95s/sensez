name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'npm/**'
      - 'editors/vscode/**'
      - 'benchmarks/**'
      - 'baseline-comparisons/**'
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'regression/**'
      - 'deny.toml'
      - 'justfile'
      - 'action/README.md'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'npm/**'
      - 'editors/vscode/**'
      - 'benchmarks/**'
      - 'baseline-comparisons/**'
      - 'pyproject.toml'
      - 'README.md'
      - 'docs/**'
      - 'mkdocs.yml'
      - 'regression/**'
      - 'deny.toml'
      - 'justfile'
      - 'action/README.md'
      - '.github/workflows/ci.yml'

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.5"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/examples/package-lock.json

      - name: Install docs example JS tooling
        run: npm ci
        working-directory: docs/examples

      - name: Install VS Code extension tooling
        run: npm install
        working-directory: editors/vscode

      - name: Check VS Code extension
        run: npm run check && npm run build
        working-directory: editors/vscode

      - name: Check formatting
        run: cargo fmt --check

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Audit dependencies
        run: cargo deny check

      - name: Lint
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Dogfood and build debug binary
        # Builds target/debug/sensez in this job; docs example verification
        # reuses that binary instead of rebuilding it in a separate workflow.
        run: cargo run -- noze . --fail-on-new must_fix

      - name: Generate docs reference
        run: uv run --no-project docs/generate.py

      - name: Verify docs reference is current
        run: git diff --exit-code -- docs/reference/findings.md

      - name: Verify docs examples against sensez
        # Drives the local debug binary: for each docs/examples/<kind>/ folder
        # bad stage must produce the named finding and fixed.* must be clean.
        run: uv run --no-project docs/verify_examples.py

      - name: Verify docs examples formatting
        run: |
          uv run --no-project --with ruff ruff format --no-cache --check docs/examples
          uv run --no-project --with ruff ruff check --no-cache --select COM812 docs/examples
          npm --prefix docs/examples run check

      - name: Build docs site
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: uv run --no-project --with mkdocs-material --with mike mkdocs build --strict

      - name: Build sensez (release)
        run: cargo build --release --features all-langs

      - name: Run regression suite
        # Exercises the pinned Flask and Zod targets against the release
        # binary so behavior drift shows up before we ship.
        run: ./regression/run.sh --target flask --target zod --ci

      - name: Run benchmarks
        run: ./benchmarks/run.sh

      - name: Deploy dev docs
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1 || true
          uv run --no-project --with mkdocs-material --with mike mike deploy --push --update-aliases dev
