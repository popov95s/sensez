name: Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build sensez binary
        # The examples verifier drives the local binary directly.
        run: cargo build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.5"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs/examples/package-lock.json

      - name: Install docs example JS tooling
        run: npm ci
        working-directory: docs/examples

      - name: Generate docs reference
        run: uv run docs/generate.py

      - name: Verify generated docs are current
        run: git diff --exit-code -- docs/reference/findings.md

      - name: Verify docs examples against sensez
        # The verifier copies each docs/examples/<kind>/ into a temporary scan
        # root alongside docs/examples/sensez.toml and asserts named findings
        # fire on the bad example while fixed.* emits nothing. Run on every
        # docs change (CD gate) and locally with `uv run docs/verify_examples.py`.
        run: uv run docs/verify_examples.py

      - name: Verify docs examples formatting
        run: |
          uv run --with ruff ruff format --no-cache --check docs/examples
          uv run --with ruff ruff check --no-cache --select COM812 docs/examples
          npm --prefix docs/examples run check

      - name: Build site
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: uv run --with mkdocs-material --with mike mkdocs build --strict

      - name: Deploy dev docs
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        env:
          NO_MKDOCS_2_WARNING: "1"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          uv run --with mkdocs-material --with mike mike deploy --push --update-aliases dev
