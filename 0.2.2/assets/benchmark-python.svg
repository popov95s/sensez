<svg xmlns="http://www.w3.org/2000/svg" width="760" height="248" viewBox="0 0 760 248" role="img" aria-labelledby="title desc">
  <title id="title">Python benchmark: lower is better</title>
  <desc id="desc">Sensez completes in 0.27 seconds, Vulture in 1.29 seconds, Repowise in 17.26 seconds, and Symilar in 234.12 seconds. Bars use a logarithmic scale.</desc>
  <style>text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24292f}.muted{fill:#57606a}.bar{fill:#0969da}.value{font-weight:600}</style>
  <rect width="760" height="248" rx="12" fill="#f6f8fa"/>
  <text x="32" y="42" font-size="20" font-weight="700">Python benchmark</text>
  <text class="muted" x="32" y="66" font-size="13">Seconds — lower is better · bars use a logarithmic scale</text>
  <text x="32" y="107" font-size="15">sensez</text><rect class="bar" x="144" y="92" width="31" height="20" rx="4"/><text class="value" x="190" y="107" font-size="15">0.27 s</text>
  <text x="32" y="147" font-size="15">vulture</text><rect class="bar" x="144" y="132" width="126" height="20" rx="4"/><text class="value" x="285" y="147" font-size="15">1.29 s</text>
  <text x="32" y="187" font-size="15">repowise</text><rect class="bar" x="144" y="172" width="328" height="20" rx="4"/><text class="value" x="487" y="187" font-size="15">17.26 s</text>
  <text x="32" y="227" font-size="15">symilar</text><rect class="bar" x="144" y="212" width="552" height="20" rx="4"/><text class="value" x="711" y="227" font-size="15" text-anchor="end">234.12 s</text>
</svg>
